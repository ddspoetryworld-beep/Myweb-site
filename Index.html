<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen Solutions | Modern Business</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* =========================================
           CSS VARIABLES & RESET
           ========================================= */
        :root {
            --primary-color: #0056b3; /* Deep Blue */
            --secondary-color: #00a8cc; /* Lighter Blue */
            --accent-color: #ff6b6b; /* Accent for hover */
            --text-dark: #333333;
            --text-light: #666666;
            --white: #ffffff;
            --bg-light: #f4f9fc;
            --transition: all 0.3s ease;
            --shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        /* =========================================
           NAVIGATION
           ========================================= */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            transition: var(--transition);
            background: transparent;
        }

        .navbar.scrolled {
            background: var(--white);
            box-shadow: var(--shadow);
            padding: 1rem 5%;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--white);
            letter-spacing: 1px;
        }

        .navbar.scrolled .logo {
            color: var(--primary-color);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
        }

        .nav-links a {
            color: var(--white);
            font-weight: 500;
            font-size: 1rem;
            transition: var(--transition);
        }

        .navbar.scrolled .nav-links a {
            color: var(--text-dark);
        }

        .nav-links a:hover {
            color: var(--secondary-color);
        }

        .hamburger {
            display: none;
            cursor: pointer;
            color: var(--white);
            font-size: 1.5rem;
        }

        .navbar.scrolled .hamburger {
            color: var(--text-dark);
        }

        /* =========================================
           HERO SECTION
           ========================================= */
        .hero {
            height: 100vh;
            background: linear-gradient(135deg, rgba(0, 86, 179, 0.9), rgba(0, 168, 204, 0.8)), url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--white);
            padding: 0 20px;
        }

        .hero-content {
            max-width: 800px;
            animation: fadeInUp 1s ease-out;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: var(--white);
            color: var(--primary-color);
            border-radius: 50px;
            font-weight: 600;
            transition: var(--transition);
            border: 2px solid var(--white);
        }

        .btn:hover {
            background: transparent;
            color: var(--white);
            transform: translateY(-3px);
        }

        /* =========================================
           GENERAL SECTION STYLES
           ========================================= */
        section {
            padding: 5rem 5%;
        }

        .section-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .section-header h2 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .section-header p {
            color: var(--text-light);
            max-width: 600px;
            margin: 0 auto;
        }

        /* =========================================
           ABOUT SECTION
           ========================================= */
        .about {
            background: var(--white);
            display: flex;
            align-items: center;
            gap: 4rem;
            flex-wrap: wrap;
        }

        .about-img {
            flex: 1;
            min-width: 300px;
        }

        .about-img img {
            width: 100%;
            border-radius: 10px;
            box-shadow: var(--shadow);
        }

        .about-text {
            flex: 1;
            min-width: 300px;
        }

        .about-text h3 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: var(--text-dark);
        }

        .about-text p {
            color: var(--text-light);
            margin-bottom: 1rem;
        }

        /* =========================================
           SERVICES SECTION
           ========================================= */
        .services {
            background: var(--bg-light);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .service-card {
            background: var(--white);
            padding: 2rem;
            border-radius: 10px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .service-card:hover {
            transform: translateY(-10px);
        }

        .service-icon {
            font-size: 3rem;
            color: var(--secondary-color);
            margin-bottom: 1.5rem;
        }

        .service-card h3 {
            margin-bottom: 1rem;
            color: var(--primary-color);
        }

        .service-card p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        /* =========================================
           TESTIMONIALS SECTION
           ========================================= */
        .testimonials {
            background: var(--white);
        }

        .testimonial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .testimonial-card {
            background: var(--bg-light);
            padding: 2rem;
            border-radius: 10px;
            border-left: 5px solid var(--primary-color);
        }

        .testimonial-text {
            font-style: italic;
            color: var(--text-light);
            margin-bottom: 1.5rem;
        }

        .client-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .client-info img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }

        .client-details h4 {
            font-size: 1rem;
            color: var(--text-dark);
        }

        .client-details span {
            font-size: 0.85rem;
            color: var(--secondary-color);
        }

        /* =========================================
           CONTACT SECTION
           ========================================= */
        .contact {
            background: var(--bg-light);
        }

        .contact-container {
            display: flex;
            flex-wrap: wrap;
            gap: 3rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .contact-info {
            flex: 1;
            min-width: 300px;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
        }

            width: 40px;
            height: 4
